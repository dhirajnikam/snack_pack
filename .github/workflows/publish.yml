name: Publish to pub.dev

# Publishes to pub.dev using pub.dev's automated publishing via GitHub Actions
# OIDC — no stored credentials/secrets.
#
# One-time setup on pub.dev (repo owner):
#   pub.dev -> package "snack_pack" -> Admin tab -> Automated publishing ->
#   Enable publishing from GitHub Actions
#     Repository:   dhirajnikam/snack_pack
#     Tag pattern:  v{{version}}
#
# After that, pushing a version tag (e.g. v1.0.2) runs the gates below and
# publishes automatically. `flutter pub publish` picks up the GitHub OIDC
# token on its own because the job has `id-token: write` permission.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Required for OIDC authentication with pub.dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Check publish warnings
        run: flutter pub publish --dry-run

      - name: Publish to pub.dev
        run: flutter pub publish --force
